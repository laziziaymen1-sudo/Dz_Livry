                <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ_livry V2.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --brand-blue: #0a192f; --brand-gold: #fcc419; }
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding-bottom: 80px; }
        .header { background: var(--brand-blue); color: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--brand-gold); }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn-blue { background: var(--brand-blue); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--brand-gold); color: var(--brand-blue); width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 12px; color: #666; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--brand-blue); font-weight: bold; }
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DZ_livry <span style="font-size:12px; color:var(--brand-gold);">V2.0</span></h1>
    </div>

    <div id="authPage" class="page active-page">
        <div class="card" id="loginBox">
            <h3>دخول التجار</h3>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-blue" onclick="handleLogin()">دخول</button>
            <p onclick="toggleAuth()" style="color:blue; font-size:12px; cursor:pointer; margin-top:15px;">ليس لديك حساب؟ سجل هنا</p>
        </div>
        
        <div class="card" id="registerBox" style="display:none;">
            <h3>إنشاء حساب تاجر جديد</h3>
            <p style="font-size: 11px; color: #666;">سيتطلب الحساب تفعيلاً لاستخدام الميزات</p>
            <input type="text" id="regName" placeholder="اسم المحل / التاجر">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleSignUp()">إنشاء الحساب والتفعيل</button>
            <p onclick="toggleAuth()" style="color:blue; font-size:12px; cursor:pointer; margin-top:15px;">تملك حساب؟ ادخل هنا</p>
        </div>
    </div>

    <div id="searchPage" class="page">
        <div class="card">
            <h3>🔍 بحث عن مشتري 🔒</h3>
            <input type="tel" id="searchPhone" placeholder="0XXXXXXXXX">
            <button class="btn-blue" onclick="checkAndSearch()">إبدأ البحث</button>
        </div>
    </div>

    <div id="reportPage" class="page">
        <div class="card">
            <h3>📢 إضافة بلاغ جديد 🔒</h3>
            <input type="tel" id="reportPhone" placeholder="رقم هاتف المشتري">
            <textarea id="reportReason" placeholder="سبب البلاغ..."></textarea>
            <button class="btn-gold" onclick="checkAndReport()">إرسال البلاغ</button>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="card">
            <h3>👤 حالة الحساب والاشتراك</h3>
            <div id="subStatus" style="font-weight:bold; padding:15px; margin:10px; border-radius:10px; background:#f9f9f9;">جاري التحميل...</div>
            
            <div id="paymentArea" style="display:none;">
                <p style="font-size:14px;">لتفعيل البحث والبلاغ، يرجى إدخال الكود الخاص بك:</p>
                <input type="text" id="activationCode" placeholder="Code XXXXXX">
                <button class="btn-gold" onclick="verifyCode()">تفعيل الحساب الآن</button>
            </div>
            
            <button class="btn-blue" style="background:#eee; color:black; margin-top:30px;" onclick="firebase.auth().signOut()">تسجيل الخروج</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" id="n1" onclick="showPage('searchPage', 'n1')">🔍<br>بحث</div>
        <div class="nav-item" id="n2" onclick="showPage('reportPage', 'n2')">📢<br>بلاغ</div>
        <div class="nav-item" id="n3" onclick="showPage('profilePage', 'n3')">👤<br>حسابي</div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyA0oo95KIoBEdOLCLwlaR92EgOewCsgu8o",
            authDomain: "dz-livry.firebaseapp.com",
            databaseURL: "https://dz-livry-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dz-livry",
            storageBucket: "dz-livry.firebasestorage.app",
            messagingSenderId: "957578073587",
            appId: "1:957578073587:web:e34939ddc0d160a1426e86"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let isUserActive = false;

        // مراقبة حالة الحساب
        auth.onAuthStateChanged(user => {
            if (user) {
                showPage('profilePage', 'n3');
                db.ref('merchants/' + user.uid).on('value', s => {
                    const data = s.val() || {};
                    isUserActive = data.is_active || false;
                    const statusEl = document.getElementById('subStatus');
                    const payArea = document.getElementById('paymentArea');
                    
                    if(isUserActive) {
                        statusEl.innerHTML = "حسابك مفعل ✅";
                        statusEl.style.color = "green";
                        payArea.style.display = "none";
                    } else {
                        statusEl.innerHTML = "حسابك غير مفعل ❌";
                        statusEl.style.color = "red";
                        payArea.style.display = "block";
                    }
                });
            } else {
                showPage('authPage', '');
            }
        });

        // دوال القفل (لا يمكن الاستخدام بدون تفعيل)
        function checkAndSearch() {
            if (!isUserActive) return alert("⚠️ الميزة مقفولة! يرجى تفعيل اشتراكك أولاً من صفحة حسابي.");
            const phone = document.getElementById('searchPhone').value;
            if(!phone) return alert("أدخل الرقم");
            db.ref('reports/' + phone).once('value', s => {
                alert(s.exists() ? "⚠️ تنبيه: هذا الرقم مسجل في القائمة السوداء!" : "✅ الرقم سليم.");
            });
        }

        function checkAndReport() {
            if (!isUserActive) return alert("⚠️ البلاغ متاح فقط للمشتركين.");
            const phone = document.getElementById('reportPhone').value;
            const res = document.getElementById('reportReason').value;
            if(!phone || !res) return alert("أكمل البيانات");
            db.ref('reports/' + phone).push({ reason: res, date: new Date().toLocaleDateString() })
            .then(() => alert("تم إرسال البلاغ بنجاح"));
        }

        function verifyCode() {
            const code = document.getElementById('activationCode').value;
            db.ref('unused_codes/' + code).once('value', s => {
                if(s.exists()){
                    db.ref('merchants/' + auth.currentUser.uid).update({ is_active: true });
                    db.ref('unused_codes/' + code).remove();
                    alert("تم التفعيل بنجاح! شكراً لاشتراكك.");
                } else { alert("الكود خاطئ"); }
            });
        }

        function showPage(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(nId) document.getElementById(nId).classList.add('active');
        }

        function toggleAuth() {
            const l = document.getElementById('loginBox');
            const r = document.getElementById('registerBox');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
            r.style.display = r.style.display === 'none' ? 'block' : 'none';
        }

        function handleLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
            .catch(e => alert("خطأ: " + e.message));
        }

        function handleSignUp() {
            const email = document.getElementById('regEmail').value;
            auth.createUserWithEmailAndPassword(email, document.getElementById('regPass').value).then(res => {
                db.ref('merchants/' + res.user.uid).set({ email: email, is_active: false });
            }).catch(e => alert("خطأ: " + e.message));
        }
    </script>
</body>
    </html>
